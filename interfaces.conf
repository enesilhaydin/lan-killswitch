# lan-killswitch interface list
#
# Each line: one interface name to protect. Lines starting with '#' ignored.
# A protected interface means: traffic forwarded FROM this interface must
# leave via tun* (any tunnel) OR it gets rejected.
#
# Defaults cover the most common tether/AP interface names across Android
# devices. Add more if your device uses a non-standard name (check with
# `ip -br link show up` while tethering is on).

br0
wlan0
wlan1
wlan2
swlan0
ap0
rndis0
usb0
wlan_ap
